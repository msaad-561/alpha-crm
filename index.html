<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Alpha CRM" />
  <meta name="theme-color" content="#2563EB" />
  <title>Alpha Businesses CRM — Client &amp; Expense Management</title>
  <meta name="description" content="Internal dashboard for managing client retainers, team payroll, founder expenses, payment tracking, and service deliverables." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" role="application" aria-label="Alpha Businesses CRM">
    <!-- Loading state -->
    <div id="app-loading" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;background:#F4F5F7">
      <div style="width:40px;height:40px;background:#2563EB;border-radius:10px;display:flex;align-items:center;justify-content:center">
        <svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <div style="font-family:Inter,sans-serif;font-size:14px;color:#6B7280;font-weight:500">Loading Alpha Businesses CRM…</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       SCRIPT LOAD ORDER (important!)
       1. Firebase CDN (compat SDK — works without a bundler)
       2. Chart.js CDN
       3. Auth gate (auth.js) — must come before data/app scripts
       4. App data layer (data.js)
       5. Firebase integration (firebase.js)
       6. Notification helpers (notifications.js)
       7. Page modules (home, clients, founders, services)
       8. App shell & router (app.js) — loaded last
  ════════════════════════════════════════════════════════════ -->

  <!-- 1. Firebase v9 Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>

  <!-- 2. Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- 3. Auth gate — shows login screen if not authenticated -->
  <script src="auth.js"></script>

  <!-- 4. App data layer & helpers -->
  <script src="data.js"></script>

  <!-- 4. Firebase integration (after data.js so STORAGE_KEY is defined) -->
  <script src="firebase.js"></script>

  <!-- 5. Notification helpers -->
  <script src="notifications.js"></script>

  <!-- 6. Page modules -->
  <script src="home.js"></script>
  <script src="clients.js"></script>
  <script src="founders.js"></script>
  <script src="services.js"></script>
  <script src="models.js"></script>
  <script src="expenses.js"></script>
  <script src="statements.js"></script>

  <!-- 7. App shell & router (must be last) -->
  <script src="app.js"></script>


  <script>
    // Remove loading screen once app is ready.
    // auth.js hides it immediately when showing the login gate,
    // so we only remove it here when the user is already logged in.
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loading = document.getElementById('app-loading');
        // Only remove if the login screen is NOT being shown
        if (loading && !document.getElementById('login-screen')) loading.remove();
      }, 400);
    });
  </script>
</body>
</html>
